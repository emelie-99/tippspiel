
<!DOCTYPE html> 
<html lang="de"> 
<head> 
<meta charset="UTF-8"> 
<title>Tippspiel</title> 
</head> 
<body> 
<h1>Tippspiel2</h1> 
<label>Name:</label> 
<input type="text" id="name"><br><br> 
<label>Tore Team A:</label> 
<input type="number" id="ToreA"><br><br> 
<label>Tore Team B:</label> 
<input type="number" id="ToreB"><br><br> 
<button onclick="speichern()">Tipp speichern</button> 
<button onclick="laden()">Tipps laden</button> 
<h2>Gespeicherte Tipps</h2> 
<div id="ausgabe"></div> 
<script type="module"> 
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"; 
const supabaseUrl = "https://mjhpzhbrolxorsgqxqrj.supabase.co"; 
const supabaseKey = sb_publishable_snME5TkXrzRibOq3xIsbDw_MBmH0Ffe; 
const supabase = createClient(supabaseUrl, supabaseKey);
  async function speichern() { 
      const name = document.getElementById("name").value; 
      const toreA = Number(document.getElementById("ToreA").value); 
      const toreB = Number(document.getElementById("ToreB").value); 
 
      const { error } = await supabase 
        .from("tipps") 
        .insert([ 
          { 
            name: name, 
            Tore_A: toreA, 
            Tore_B: toreB 
          } 
        ]); 
 
      if (error) { 
        document.getElementById("ausgabe").innerHTML = 
          "Fehler beim Speichern: " + error.message; 
        return; 
      } 
 
      document.getElementById("ausgabe").innerHTML = "Tipp gespeichert!"; 
      await laden(); 
    } 
 
    async function laden() { 
      const { data, error } = await supabase 
        .from("tipps") 
        .select("*") 
        .order("id", { ascending: true }); 
 
      if (error) { 
        document.getElementById("ausgabe").innerHTML = 
          "Fehler beim Laden: " + error.message; 
        return; 
      } 
 
      let text = "";
        for (let i = 0; i < data.length; i++) { 
        let tipp = data[i]; 
        text += 
          tipp.name + ": " + 
          tipp.Tore_a + " : " + tipp.Tore_b + 
          "<br>"; 
} 
document.getElementById("ausgabe").innerHTML = text; 
} 
window.speichern = speichern; 
window.laden = laden; 
laden(); 
</script> 
</body> 
</html>
